<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Aishwaryam Promoters — Admin</title>
<link rel="stylesheet" href="fonts.css">
<style>
  :root {
    color-scheme: light;
    --navy-950: #0a1220;
    --navy-900: #0f1b2e;
    --navy-800: #16273f;
    --navy-700: #1f3350;
    --navy-600: #2c4468;
    --gold-700: #8a6416;
    --gold-600: #a97c22;
    --gold-500: #c8963e;
    --gold-100: #f7ecd8;
    --page: #f5f6f8;
    --surface: #ffffff;
    --surface-sunken: #f0f2f5;
    --ink-primary: #16202e;
    --ink-secondary: #5b6472;
    --ink-muted: #8b93a1;
    --border: rgba(15,23,42,0.09);
    --border-strong: rgba(15,23,42,0.16);
    --shadow-sm: 0 1px 2px rgba(15,23,42,0.06), 0 1px 1px rgba(15,23,42,0.04);
    --shadow-md: 0 4px 10px rgba(15,23,42,0.08), 0 2px 4px rgba(15,23,42,0.05);
    --shadow-lg: 0 12px 28px rgba(15,23,42,0.12), 0 4px 10px rgba(15,23,42,0.06);
    --good: #0ca30c;
    --good-bg: #e5f7e5;
    --warning: #a66c00;
    --warning-bg: #fdf1d6;
    --serious: #c1502c;
    --serious-bg: #fbe8e0;
    --critical: #c22e2e;
    --critical-bg: #fbe4e4;
    --seq-1: #86b6ef;
    --seq-2: #5598e7;
    --seq-3: #2a78d6;
    --seq-4: #1c5cab;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --font-display: 'Archivo', system-ui, -apple-system, sans-serif;
    --font-body: 'Manrope', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--page);
    color: var(--ink-primary);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  h1, h2, h3, h4, .brand, button, .nav-item, .btn { font-family: var(--font-display); }
  .num, td.num, .stat-value, .badge-count { font-variant-numeric: tabular-nums; font-family: var(--font-mono); }
  a { color: inherit; }
  button { font: inherit; cursor: pointer; }
  input, select, textarea { font: inherit; }

  @media (prefers-reduced-motion: no-preference) {
    .card, .btn, .nav-item, .modal-panel, .toast { transition: box-shadow .18s ease, transform .18s ease, background .18s ease, border-color .18s ease; }
  }

  /* ---------- Layout shell ---------- */
  #app { min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 248px; flex-shrink: 0; background: linear-gradient(180deg, var(--navy-900), var(--navy-950));
    color: #dfe6f0; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh;
  }
  .sidebar-brand { padding: 22px 20px 18px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-brand .mark {
    width: 34px; height: 34px; border-radius: 9px; background: linear-gradient(145deg, var(--gold-500), var(--gold-700));
    display: flex; align-items: center; justify-content: center; color: #241a05; font-weight: 800; font-size: 15px; box-shadow: var(--shadow-sm);
  }
  .sidebar-brand .name { font-weight: 700; font-size: 15px; color: #fff; line-height: 1.2; }
  .sidebar-brand .sub { font-size: 11px; color: #93a1b8; letter-spacing: .04em; text-transform: uppercase; }
  .sidebar-nav { flex: 1; padding: 14px 10px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
  .nav-item {
    display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: var(--radius-sm);
    background: transparent; border: none; color: #b7c2d3; text-align: left; font-size: 13.5px; font-weight: 600;
    width: 100%;
  }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: .85; }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .nav-item.active { background: rgba(200,150,62,0.16); color: #f3d99b; }
  .nav-item.active svg { opacity: 1; }
  .sidebar-foot { padding: 14px; border-top: 1px solid rgba(255,255,255,0.08); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: var(--radius-sm); }
  .sidebar-user .avatar {
    width: 32px; height: 32px; border-radius: 50%; background: var(--navy-700); color: #fff; display: flex;
    align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0;
  }
  .sidebar-user .who { flex: 1; min-width: 0; }
  .sidebar-user .who .n { color: #fff; font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-user .who .r { color: #8fa0b8; font-size: 11px; }
  .logout-btn { background: none; border: none; color: #8fa0b8; padding: 6px; border-radius: 6px; display: flex; }
  .logout-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .logout-btn svg { width: 16px; height: 16px; }

  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .topbar {
    height: 64px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 5;
  }
  .topbar h1 { margin: 0; font-size: 18px; font-weight: 700; }
  .topbar .sub { font-size: 12.5px; color: var(--ink-muted); margin-top: 1px; }
  .content { padding: 26px 28px 60px; max-width: 1240px; width: 100%; margin: 0 auto; }

  /* ---------- Primitives ---------- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 9px 16px;
    border-radius: var(--radius-sm); border: 1px solid transparent; font-weight: 700; font-size: 13.5px;
    min-height: 38px; white-space: nowrap;
  }
  .btn svg { width: 15px; height: 15px; }
  .btn-primary { background: linear-gradient(160deg, var(--gold-500), var(--gold-600)); color: #241a05; box-shadow: var(--shadow-sm); }
  .btn-primary:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary { background: var(--surface); border-color: var(--border-strong); color: var(--ink-primary); }
  .btn-secondary:hover { background: var(--surface-sunken); }
  .btn-ghost { background: transparent; color: var(--ink-secondary); border-color: transparent; }
  .btn-ghost:hover { background: var(--surface-sunken); color: var(--ink-primary); }
  .btn-danger { background: var(--critical-bg); color: var(--critical); }
  .btn-danger:hover { filter: brightness(0.97); }
  .btn-sm { min-height: 30px; padding: 5px 11px; font-size: 12.5px; border-radius: 7px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-block { width: 100%; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm); padding: 20px;
  }
  .card-title { font-size: 14px; font-weight: 700; margin: 0 0 4px; display: flex; align-items: center; gap: 8px; }
  .card-sub { font-size: 12px; color: var(--ink-muted); margin: 0 0 14px; }
  .title-icon {
    width: 24px; height: 24px; border-radius: 7px; display: inline-flex; align-items: center;
    justify-content: center; flex-shrink: 0; background: var(--surface-sunken); color: var(--ink-secondary);
  }
  .title-icon svg { width: 13px; height: 13px; }
  .title-icon.gold { background: var(--gold-100); color: var(--gold-700); }

  .grid { display: grid; gap: 16px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  @media (max-width: 1080px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .grid-3 { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px) { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } }

  .stat-tile { display: flex; flex-direction: column; gap: 6px; }
  .stat-tile .label { font-size: 12px; color: var(--ink-muted); font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
  .stat-tile .value { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }
  .stat-tile .delta { font-size: 12px; font-weight: 700; }
  .stat-tile .delta.good { color: var(--good); }
  .stat-tile .delta.muted { color: var(--ink-muted); }
  .stat-tile .icon-badge {
    width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center;
    background: var(--gold-100); color: var(--gold-700); margin-bottom: 2px;
  }
  .stat-tile .icon-badge svg { width: 17px; height: 17px; }

  .pill {
    display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 100px;
    font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; white-space: nowrap;
  }
  .pill-new { background: #eef2f6; color: #57616f; }
  .pill-contacted { background: #e8f0fc; color: #2a5b9c; }
  .pill-site_visit { background: #e6effb; color: #1c5cab; }
  .pill-negotiation { background: #eef1fb; color: #4a3aa7; }
  .pill-closed_won { background: var(--good-bg); color: var(--good); }
  .pill-closed_lost { background: var(--critical-bg); color: var(--critical); }
  .pill-pending { background: var(--warning-bg); color: var(--warning); }
  .pill-approved { background: var(--good-bg); color: var(--good); }
  .pill-rejected { background: var(--critical-bg); color: var(--critical); }
  .pill-done { background: var(--good-bg); color: var(--good); }
  .pill-missed { background: var(--critical-bg); color: var(--critical); }
  .pill-available { background: var(--good-bg); color: var(--good); }
  .pill-sold { background: #eef1fb; color: #4a3aa7; }
  .pill-booked { background: var(--warning-bg); color: var(--warning); }
  .pill-active { background: var(--good-bg); color: var(--good); }
  .pill-inactive { background: var(--surface-sunken); color: var(--ink-muted); }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-muted); font-weight: 700; padding: 0 12px 10px; }
  td { padding: 12px; font-size: 13.5px; border-top: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: var(--surface-sunken); }
  .table-wrap { overflow-x: auto; }
  .table-card { padding: 8px 8px 4px; }
  .table-card th:first-child, .table-card td:first-child { padding-left: 16px; }
  .empty-row td { text-align: center; color: var(--ink-muted); padding: 30px 12px; }

  label.field { display: block; margin-bottom: 14px; }
  label.field .lbl { display: block; font-size: 12.5px; font-weight: 700; color: var(--ink-secondary); margin-bottom: 6px; }
  input[type=text], input[type=email], input[type=password], input[type=number], input[type=date],
  input[type=datetime-local], input[type=tel], select, textarea {
    width: 100%; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong);
    background: var(--surface); font-size: 14.5px; color: var(--ink-primary); min-height: 42px;
  }
  textarea { min-height: 80px; resize: vertical; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold-500); box-shadow: 0 0 0 3px rgba(200,150,62,0.16); }
  .form-row { display: flex; gap: 12px; }
  .form-row > * { flex: 1; }
  .hint { font-size: 11.5px; color: var(--ink-muted); margin-top: 5px; }
  .error-text { font-size: 12.5px; color: var(--critical); margin-top: 6px; }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(10,18,32,0.45); display: flex; align-items: center;
    justify-content: center; z-index: 60; padding: 20px; backdrop-filter: blur(2px);
  }
  .modal-panel {
    background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
    width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; padding: 24px;
  }
  .modal-panel.wide { max-width: 640px; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .modal-head h3 { margin: 0; font-size: 17px; }
  .modal-close { background: none; border: none; color: var(--ink-muted); padding: 4px; border-radius: 6px; }
  .modal-close:hover { background: var(--surface-sunken); }

  .toast-stack { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
  .toast {
    background: var(--navy-900); color: #fff; padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13.5px;
    box-shadow: var(--shadow-lg); max-width: 320px; font-weight: 600; display: flex; align-items: center; gap: 8px;
  }
  .toast.success { background: #0d3d1a; }
  .toast.error { background: #4a1414; }

  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .section-head h2 { margin: 0; font-size: 19px; }
  .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-chip {
    padding: 6px 13px; border-radius: 100px; border: 1px solid var(--border-strong); background: var(--surface);
    font-size: 12.5px; font-weight: 700; color: var(--ink-secondary);
  }
  .filter-chip.active { background: var(--navy-900); border-color: var(--navy-900); color: #fff; }

  .progress-track { height: 8px; border-radius: 100px; background: var(--surface-sunken); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--gold-500), var(--gold-600)); }

  .kv { display: flex; justify-content: space-between; font-size: 13px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .kv:last-child { border-bottom: none; }
  .kv .k { color: var(--ink-muted); }
  .kv .v { font-weight: 700; }

  .avatar-sm { width: 28px; height: 28px; border-radius: 50%; background: var(--navy-800); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 11.5px; font-weight: 700; }
  .rank-badge { width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; background: var(--surface-sunken); color: var(--ink-secondary); }
  .rank-badge.r1 { background: var(--gold-100); color: var(--gold-700); }

  /* ---------- Login ---------- */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 30% 20%, var(--navy-800), var(--navy-950)); padding: 20px; }
  .login-card { width: 100%; max-width: 400px; background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 32px; }
  .login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .login-brand .mark { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(145deg, var(--gold-500), var(--gold-700)); display: flex; align-items: center; justify-content: center; color: #241a05; font-weight: 800; font-size: 18px; }
  .login-brand h1 { font-size: 17px; margin: 0; }
  .login-brand p { font-size: 12px; color: var(--ink-muted); margin: 2px 0 0; }
  .login-tabs { display: flex; gap: 4px; background: var(--surface-sunken); padding: 4px; border-radius: 10px; margin-bottom: 20px; }
  .login-tab { flex: 1; padding: 8px; border: none; background: transparent; border-radius: 7px; font-weight: 700; font-size: 13px; color: var(--ink-secondary); }
  .login-tab.active { background: var(--surface); box-shadow: var(--shadow-sm); color: var(--ink-primary); }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--ink-muted); }
  .empty-state svg { width: 40px; height: 40px; margin-bottom: 10px; opacity: .4; }
  .empty-state p { margin: 0; font-size: 13.5px; }

  .lead-detail-notes { white-space: pre-wrap; font-size: 13px; color: var(--ink-secondary); background: var(--surface-sunken); padding: 12px; border-radius: 8px; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  @media (max-width: 860px) {
    .sidebar { position: fixed; left: -260px; z-index: 50; transition: left .2s ease; box-shadow: var(--shadow-lg); }
    .sidebar.open { left: 0; }
    .content { padding: 18px 16px 50px; }
    .topbar { padding: 0 16px; }
    .menu-btn { display: inline-flex !important; }
  }
  .menu-btn { display: none; background: none; border: none; padding: 6px; border-radius: 6px; }
  .menu-btn svg { width: 20px; height: 20px; }
  .sidebar-scrim { display: none; }
  .sidebar-scrim.show { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 45; }

  /* ---------- Charts (horizontal bars) ---------- */
  .hbars { display: flex; flex-direction: column; gap: 12px; }
  .hbar-row { display: grid; grid-template-columns: 108px 1fr 64px; align-items: center; gap: 10px; }
  .hbar-label { font-size: 12.5px; font-weight: 700; color: var(--ink-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hbar-track { height: 10px; border-radius: 100px; background: var(--surface-sunken); overflow: hidden; }
  .hbar-fill { height: 100%; border-radius: 100px; min-width: 4px; }
  .hbar-value { font-size: 12.5px; font-weight: 700; text-align: right; }

  /* ---------- Kanban ---------- */
  .kanban-board { display: grid; grid-template-columns: repeat(6, minmax(180px, 1fr)); gap: 12px; overflow-x: auto; }
  @media (max-width: 1080px) { .kanban-board { grid-auto-flow: column; grid-template-columns: unset; } .kanban-board > * { width: 220px; } }
  .kanban-col { background: var(--surface-sunken); border-radius: var(--radius-md); padding: 10px; min-height: 120px; }
  .kanban-col-head { display: flex; align-items: center; justify-content: space-between; padding: 4px 6px 10px; }
  .kanban-col-head .t { font-size: 11.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .03em; color: var(--ink-secondary); }
  .kanban-col-head .c { font-size: 11px; font-weight: 800; background: var(--surface); border-radius: 100px; padding: 1px 8px; color: var(--ink-muted); }
  .kanban-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 11px; margin-bottom: 8px; box-shadow: var(--shadow-sm); }
  .kanban-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); cursor: pointer; }
  .kanban-card .n { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .kanban-card .m { font-size: 11.5px; color: var(--ink-muted); }

  /* ---------- Calendar / list rows ---------- */
  .list-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 4px; border-top: 1px solid var(--border); }
  .list-row:first-child { border-top: none; }
  .list-row .main-text { font-size: 13.5px; font-weight: 700; }
  .list-row .sub-text { font-size: 12px; color: var(--ink-muted); margin-top: 1px; }

  .tab-strip { display: flex; gap: 4px; background: var(--surface-sunken); padding: 4px; border-radius: 10px; margin-bottom: 16px; width: fit-content; }
  .tab-strip button { padding: 7px 15px; border: none; background: transparent; border-radius: 7px; font-weight: 700; font-size: 12.5px; color: var(--ink-secondary); }
  .tab-strip button.active { background: var(--surface); box-shadow: var(--shadow-sm); color: var(--ink-primary); }
</style>
</head>

<div id="app"></div>
<div class="toast-stack" id="toastStack"></div>

let session = null;
try { session = JSON.parse(localStorage.getItem('ap_session') || 'null'); } catch(e) { session = null; }
function saveSession(){ localStorage.setItem('ap_session', JSON.stringify(session)); }
function isAdmin(){ return session && session.type === 'admin'; }
function isEmployee(){ return session && session.type === 'employee'; }

// Every read/write RPC takes p_admin_passcode + p_employee_id + p_password (or a subset) —
// this builds the shared triple from whichever role is logged in.
function authTriple(){
  if (isAdmin()) return { p_admin_passcode: session.passcode, p_employee_id: null, p_password: null };
  if (isEmployee()) return { p_admin_passcode: null, p_employee_id: session.employee.id, p_password: session.password };
  return { p_admin_passcode: null, p_employee_id: null, p_password: null };
}

async function rpc(name, params){
  const { data, error } = await sb.rpc(name, params);
  if (error) { toast(error.message || 'Something went wrong', 'error'); throw error; }
  return data;
}

// ============================================================

function toast(msg, kind){
  const stack = document.getElementById('toastStack');
  const el = document.createElement('div');
  el.className = 'toast' + (kind === 'success' ? ' success' : kind === 'error' ? ' error' : '');
  el.textContent = msg;
  stack.appendChild(el);
  setTimeout(() => el.remove(), 3600);
}

// Formatting helpers
// ============================================================
function money(n){ return '₹' + Math.round(Number(n)||0).toLocaleString('en-IN'); }
function pct(n){ return Math.round((Number(n)||0) * 100) + '%'; }
function fmtDate(d){ if(!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'}); }
function fmtDateTime(d){ if(!d) return '—'; const dt = new Date(d); return dt.toLocaleDateString('en-IN', {day:'numeric', month:'short'}) + ', ' + dt.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'}); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
// Resolves to {lat:null,lng:null} rather than rejecting on denial/timeout/no-support, so
// check-in/out never gets blocked by a missing or refused location permission.
function getLocation(){
  return new Promise((resolve) => {
    if (!navigator.geolocation){ resolve({ lat: null, lng: null }); return; }
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      () => resolve({ lat: null, lng: null }),
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
    );
  });
}
function mapLink(lat, lng){
  return lat != null && lng != null
    ? `<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" rel="noopener" style="color:var(--gold-600);font-weight:700">View map</a>`
    : '<span class="hint" style="margin:0">no location</span>';
}
function initials(name){ return (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function statusLabel(s){ return (s||'').replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  const empForm = document.getElementById('employeeLoginForm');

    e.preventDefault();
    const fd = new FormData(empForm);
    const btn = empForm.querySelector('button');
    btn.disabled = true;
    try {
      const data = await rpc('employee_login', { p_email: fd.get('email'), p_password: fd.get('password') });
      if (!data.success){
        errEl().textContent = data.error === 'wrong_password' ? 'Incorrect email or password.'
          : data.error === 'no_account' ? 'No account with that email.'
          : data.error === 'account_inactive' ? 'This account has been deactivated.'
          : data.error === 'too_many_attempts' ? 'Too many attempts — try again in a few minutes.'
          : 'Could not sign in.';
        errEl().style.display = 'block';
        return;

      session = { type: 'employee', employee: data.employee, password: fd.get('password') };
      saveSession();
      route = 'dashboard';
      render();
    } finally { btn.disabled = false; }
  };
  const adminForm = document.getElementById('adminLoginForm');
  if (adminForm) adminForm.onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(adminForm);
    const btn = adminForm.querySelector('button');
    btn.disabled = true;
    try {
      const ok = await rpc('admin_verify_passcode', { p_passcode: fd.get('passcode') });
      if (!ok){
        errEl().textContent = 'Incorrect passcode.';
        errEl().style.display = 'block';
        return;
      }
      session = { type: 'admin', passcode: fd.get('passcode') };
      saveSession();
      route = 'dashboard';
      render();
    } finally { btn.disabled = false; }
  };
}

const STAGE_LABELS = { new: 'New', contacted: 'Contacted', site_visit: 'Site Visit', negotiation: 'Negotiation', closed_won: 'Closed Won', closed_lost: 'Closed Lost' };
const STAGE_COLORS = { new: 'var(--seq-1)', contacted: 'var(--seq-2)', site_visit: 'var(--seq-3)', negotiation: 'var(--seq-4)', closed_won: 'var(--good)', closed_lost: 'var(--critical)' };

function computeLeadStats(leads){
  const counts = {}; LEAD_STAGES.forEach(s => counts[s] = 0);
  leads.forEach(l => { counts[l.status] = (counts[l.status]||0) + 1; });
  const total = leads.length;
  const closedWon = counts.closed_won || 0;
  const conversionRate = total ? closedWon / total : 0;
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const closedValueThisMonth = leads
    .filter(l => l.status === 'closed_won' && new Date(l.updated_at) >= monthStart)
    .reduce((s, l) => s + Number(l.closed_value || 0), 0);
  return { counts, total, closedWon, conversionRate, closedValueThisMonth };
}

function renderHBars(items){
  if (!items.length) return '<div class="empty-state"><p>Nothing to show yet.</p></div>';
  const max = Math.max(1, ...items.map(i => i.value));
  return `<div class="hbars">${items.map(i => `
    <div class="hbar-row">
      <div class="hbar-label">${escapeHtml(i.label)}</div>
      <div class="hbar-track"><div class="hbar-fill" style="width:${Math.max(3, i.value/max*100)}%; background:${i.color || 'var(--seq-3)'}"></div></div>
      <div class="hbar-value num">${i.valueLabel != null ? i.valueLabel : i.value}</div>
    </div>`).join('')}</div>`;
}

async function fetchMyOrAllLeads(){ return await rpc('list_leads', authTriple()); }
async function fetchMyOrAllFollowUps(){ return await rpc('list_follow_ups', authTriple()); }
async function fetchMyOrAllActivity(){ return await rpc('list_activity', authTriple()); }
async function fetchMyOrAllDayOffs(){ return await rpc('list_day_offs', authTriple()); }
// p_month_start is intentionally omitted so Postgres applies its own default
// (start of current month) — passing an explicit null would override that default with
// a literal NULL and silently zero out every employee's numbers.
async function fetchLeaderboard(){ return await rpc('get_leaderboard', authTriple()); }
async function fetchEmployeesPublic(){ return await rpc('list_employees_public', authTriple()); }
async function fetchPlots(){ return await rpc('list_plots', authTriple()); }

function dueBucket(followUp){
  if (followUp.status !== 'pending') return followUp.status;
  const due = new Date(followUp.due_at);
  const now = new Date();
  const todayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
  if (due < now) return 'overdue';
  if (due <= todayEnd) return 'today';
  return 'upcoming';
}

// ============================================================
async function renderLeads(){
  const [leads, plots, employees] = await Promise.all([
    fetchMyOrAllLeads(), fetchPlots(), isAdmin() ? fetchEmployeesPublic() : Promise.resolve([])
  ]);
  leadsData = { leads, plots, employees };
  const cols = LEAD_STAGES.map(stage => {
    const items = leads.filter(l => l.status === stage);
    return `<div class="kanban-col">
      <div class="kanban-col-head"><span class="t">${STAGE_LABELS[stage]}</span><span class="c">${items.length}</span></div>
      ${items.map(l => `
        <div class="kanban-card" data-lead="${l.id}">
          <div class="n">${escapeHtml(l.name)}</div>
          <div class="m">${escapeHtml(l.phone)}${l.budget ? ' · ' + money(l.budget) : ''}</div>
        </div>`).join('')}
    </div>`;
  }).join('');
  return `
  <div class="section-head">
    <h2>${isAdmin() ? 'All Leads' : 'My Leads'}</h2>
    <button class="btn btn-primary" id="addLeadBtn">${icon('plus')} Add Lead</button>
  </div>
  <div class="kanban-board">${cols}</div>`;
}

function bindLeads(){
  document.getElementById('addLeadBtn').onclick = openAddLeadModal;
  document.querySelectorAll('[data-lead]').forEach(el => el.onclick = () => openLeadDetailModal(el.dataset.lead));
}

function openAddLeadModal(){
  const { plots, employees } = leadsData;
  openModal(`
    <div class="modal-panel">
      <div class="modal-head"><h3>Add Lead</h3><button class="modal-close">${icon('close')}</button></div>
      <form id="addLeadForm">
        <label class="field"><span class="lbl">Name</span><input type="text" name="name" required></label>
        <div class="form-row">
          <label class="field"><span class="lbl">Phone</span><input type="tel" name="phone" required></label>
          <label class="field"><span class="lbl">Source</span><input type="text" name="source" placeholder="Referral, Ad, Walk-in…"></label>
        </div>
        <div class="form-row">
          <label class="field"><span class="lbl">Plot of interest</span>
            <select name="plot_id"><option value="">— None —</option>${plots.map(p => `<option value="${p.id}">${escapeHtml(plotLabel(p))}</option>`).join('')}</select>
          </label>
          <label class="field"><span class="lbl">Budget (₹)</span><input type="number" name="budget" min="0"></label>
        </div>
        ${isAdmin() ? `
        <label class="field"><span class="lbl">Assign to</span>
          <select name="assigned_to"><option value="">— Unassigned —</option>${employees.map(e => `<option value="${e.id}">${escapeHtml(e.name)}</option>`).join('')}</select>
        </label>` : ''}
        <label class="field"><span class="lbl">Notes</span><textarea name="notes"></textarea></label>
        <button class="btn btn-primary btn-block" type="submit">Add Lead</button>
      </form>
    </div>`);
  document.getElementById('addLeadForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const res = await rpc('add_lead', {
      ...authTriple(), p_name: fd.get('name'), p_phone: fd.get('phone'), p_source: fd.get('source') || '',
      p_plot_id: fd.get('plot_id') || null, p_budget: fd.get('budget') ? Number(fd.get('budget')) : 0,
      p_notes: fd.get('notes') || '', p_assigned_to: fd.get('assigned_to') || null
    });
    if (res.success) { toast('Lead added', 'success'); closeModal(); renderRoute(); }
    else toast(res.error || 'Could not add lead', 'error');
  };
}

function openLeadDetailModal(id){
  const lead = leadsData.leads.find(l => l.id === id);
  if (!lead) return;
  const { employees, plots } = leadsData;
  const plot = plots.find(p => p.id === lead.plot_id);
  openModal(`
    <div class="modal-panel wide">
      <div class="modal-head"><h3>${escapeHtml(lead.name)}</h3><button class="modal-close">${icon('close')}</button></div>
      <div class="kv"><span class="k">Phone</span><span class="v">${escapeHtml(lead.phone)}</span></div>
      <div class="kv"><span class="k">Source</span><span class="v">${escapeHtml(lead.source || '—')}</span></div>
      <div class="kv"><span class="k">Plot</span><span class="v">${plot ? escapeHtml(plotLabel(plot)) : '—'}</span></div>
      <div class="divider"></div>
      <form id="leadUpdateForm">
        <div class="form-row">
          <label class="field"><span class="lbl">Status</span>
            <select name="status">${LEAD_STAGES.map(s => `<option value="${s}" ${s === lead.status ? 'selected' : ''}>${STAGE_LABELS[s]}</option>`).join('')}</select>
          </label>
          <label class="field"><span class="lbl">Closed value (₹, if won)</span><input type="number" name="closed_value" min="0" value="${lead.closed_value || 0}"></label>
        </div>
        ${isAdmin() ? `
        <label class="field"><span class="lbl">Assigned to</span>
          <select name="assigned_to"><option value="">— Unassigned —</option>${employees.map(e => `<option value="${e.id}" ${e.id === lead.assigned_to ? 'selected' : ''}>${escapeHtml(e.name)}</option>`).join('')}</select>
        </label>` : ''}
        <label class="field"><span class="lbl">Notes</span><textarea name="notes">${escapeHtml(lead.notes || '')}</textarea></label>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" type="submit">Save changes</button>
          <button class="btn btn-secondary" type="button" id="quickFollowUpBtn">${icon('followup')} Add follow-up</button>
        </div>
      </form>
    </div>`);
  document.getElementById('leadUpdateForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const ok = await rpc('update_lead_status', {
      ...authTriple(), p_lead_id: lead.id, p_status: fd.get('status'),
      p_closed_value: fd.get('closed_value') ? Number(fd.get('closed_value')) : 0,
      p_notes: fd.get('notes'), p_assigned_to: fd.get('assigned_to') || null
    });
    if (ok) { toast('Lead updated', 'success'); closeModal(); renderRoute(); }
    else toast('Could not update lead', 'error');
  };
  document.getElementById('quickFollowUpBtn').onclick = () => openAddFollowUpModal(lead.id, leadsData.leads);
}

function openAddFollowUpModal(leadId, leadsList){
  const list = leadsList || leadsData.leads;
  const lead = leadId ? list.find(l => l.id === leadId) : null;
  openModal(`
    <div class="modal-panel">
      <div class="modal-head"><h3>Add Follow-up</h3><button class="modal-close">${icon('close')}</button></div>
      <form id="addFollowUpForm">
        ${lead ? `<p class="hint" style="margin-top:-8px;margin-bottom:14px">For lead: <strong>${escapeHtml(lead.name)}</strong></p>` : `
        <label class="field"><span class="lbl">Lead</span>
          <select name="lead_id" required><option value="">Select a lead</option>${list.map(l => `<option value="${l.id}">${escapeHtml(l.name)}</option>`).join('')}</select>
        </label>`}
        <label class="field"><span class="lbl">Due date & time</span><input type="datetime-local" name="due_at" required></label>
        <label class="field"><span class="lbl">Notes</span><textarea name="notes" placeholder="What to follow up about"></textarea></label>
        <button class="btn btn-primary btn-block" type="submit">Add Follow-up</button>
      </form>
    </div>`);
  document.getElementById('addFollowUpForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const targetLeadId = leadId || fd.get('lead_id');
    const res = await rpc('add_follow_up', { ...authTriple(), p_lead_id: targetLeadId, p_due_at: new Date(fd.get('due_at')).toISOString(), p_notes: fd.get('notes') || '' });
    if (res.success) { toast('Follow-up added', 'success'); closeModal(); if (route === 'followups') renderRoute(); }
    else toast(res.error || 'Could not add follow-up', 'error');
  };
}

// ============================================================
// Follow-ups
// ============================================================
async function renderFollowUps(){
  const [followUps, leads] = await Promise.all([fetchMyOrAllFollowUps(), fetchMyOrAllLeads()]);
  followUpsData = { followUps, leads };
  const filtered = followUps.filter(f => fuFilter === 'all' ? true : dueBucket(f) === fuFilter);
  const leadName = id => (leads.find(l => l.id === id) || {}).name || 'Unknown lead';
  const rows = filtered.map(f => `
    <div class="list-row">
      <div>
        <div class="main-text">${escapeHtml(leadName(f.lead_id))}</div>
        <div class="sub-text">${escapeHtml(f.notes || '')}${f.notes ? ' · ' : ''}Due ${fmtDateTime(f.due_at)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="pill pill-${f.status === 'done' ? 'done' : dueBucket(f) === 'overdue' ? 'missed' : 'pending'}">${f.status === 'done' ? 'Done' : dueBucket(f) === 'overdue' ? 'Overdue' : dueBucket(f) === 'today' ? 'Today' : 'Upcoming'}</span>
        ${f.status === 'pending' ? `<button class="btn btn-sm btn-secondary" data-complete="${f.id}">${icon('check')} Done</button>` : ''}
      </div>
    </div>`).join('') || '<div class="empty-state"><p>No follow-ups here.</p></div>';
  return `
  <div class="section-head"><h2>Follow-ups</h2><button class="btn btn-primary" id="addFollowUpBtn">${icon('plus')} Add Follow-up</button></div>
  <div class="filter-bar">
    ${['all', 'overdue', 'today', 'upcoming', 'done'].map(k => `<button class="filter-chip ${fuFilter === k ? 'active' : ''}" data-filter="${k}">${k[0].toUpperCase() + k.slice(1)}</button>`).join('')}
  </div>
  <div class="card table-card">${rows}</div>`;
}

function bindFollowUps(){
  document.getElementById('addFollowUpBtn').onclick = () => openAddFollowUpModal(null, followUpsData.leads);
  document.querySelectorAll('[data-filter]').forEach(b => b.onclick = () => { fuFilter = b.dataset.filter; renderRoute(); });
  document.querySelectorAll('[data-complete]').forEach(b => b.onclick = async () => {
    const ok = await rpc('complete_follow_up', { ...authTriple(), p_follow_up_id: b.dataset.complete });
    if (ok) { toast('Marked done', 'success'); renderRoute(); }
  });
}

// ============================================================
// Daily activity
// ============================================================
async function renderActivity(){
  const activity = await fetchMyOrAllActivity();
  activityData.activity = activity;
  if (isEmployee()){
    const today = activity.find(a => a.activity_date === todayISO()) || {};
    const history = activity.slice(0, 30);
    return `
    <div class="grid grid-3" style="margin-bottom:16px">
      <div class="card">
        <div class="card-title">Check-in / Check-out</div>
        <div class="card-sub">${fmtDate(todayISO())}</div>
        <div class="kv"><span class="k">Checked in</span><span class="v">${today.check_in_time ? fmtDateTime(today.check_in_time) : '—'}</span></div>
        ${today.check_in_time ? `<div class="kv"><span class="k">Check-in location</span><span class="v">${mapLink(today.check_in_lat, today.check_in_lng)}</span></div>` : ''}
        <div class="kv"><span class="k">Checked out</span><span class="v">${today.check_out_time ? fmtDateTime(today.check_out_time) : '—'}</span></div>
        ${today.check_out_time ? `<div class="kv"><span class="k">Check-out location</span><span class="v">${mapLink(today.check_out_lat, today.check_out_lng)}</span></div>` : ''}
        <p class="hint" style="margin-top:10px">Your location is captured when you check in/out and is visible to your admin.</p>
        <div style="display:flex;gap:10px;margin-top:10px">
          <button class="btn btn-secondary btn-block" id="checkInBtn" ${today.check_in_time ? 'disabled' : ''}>${icon('clock')} Check in</button>
          <button class="btn btn-secondary btn-block" id="checkOutBtn" ${!today.check_in_time || today.check_out_time ? 'disabled' : ''}>${icon('clock')} Check out</button>
        </div>
      </div>
      <div class="card" style="grid-column:span 2">
        <div class="card-title">Log today's activity</div>
        <form id="activityForm">
          <div class="form-row">
            <label class="field"><span class="lbl">Calls made</span><input type="number" min="0" name="calls_made" value="${today.calls_made || 0}"></label>
            <label class="field"><span class="lbl">Site visits</span><input type="number" min="0" name="site_visits" value="${today.site_visits || 0}"></label>
          </div>
          <div class="form-row">
            <label class="field"><span class="lbl">Meetings</span><input type="number" min="0" name="meetings" value="${today.meetings || 0}"></label>
            <label class="field"><span class="lbl">New leads</span><input type="number" min="0" name="new_leads" value="${today.new_leads || 0}"></label>
          </div>
          <label class="field"><span class="lbl">Notes</span><textarea name="notes">${escapeHtml(today.notes || '')}</textarea></label>
          <button class="btn btn-primary" type="submit">Save today's log</button>
        </form>
      </div>
    </div>
    <div class="card table-card">
      <div class="card-title" style="padding:8px 8px 0">History</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Date</th><th>Calls</th><th>Visits</th><th>Meetings</th><th>New Leads</th><th>In</th><th>Out</th></tr></thead>
        <tbody>${history.map(a => `<tr><td>${fmtDate(a.activity_date)}</td><td class="num">${a.calls_made}</td><td class="num">${a.site_visits}</td><td class="num">${a.meetings}</td><td class="num">${a.new_leads}</td><td>${a.check_in_time ? fmtDateTime(a.check_in_time).split(', ')[1] + ' · ' + mapLink(a.check_in_lat, a.check_in_lng) : '—'}</td><td>${a.check_out_time ? fmtDateTime(a.check_out_time).split(', ')[1] + ' · ' + mapLink(a.check_out_lat, a.check_out_lng) : '—'}</td></tr>`).join('') || '<tr class="empty-row"><td colspan="7">No activity logged yet.</td></tr>'}</tbody>
      </table></div>
    </div>`;
  }
  const employees = await fetchEmployeesPublic();
  activityData.employees = employees;
  const filtered = activityFilterEmp ? activity.filter(a => a.employee_id === activityFilterEmp) : activity;
  const empName = id => (employees.find(e => e.id === id) || {}).name || 'Unknown';
  return `
  <div class="section-head"><h2>Team Activity</h2>
    <select id="empFilter"><option value="">All employees</option>${employees.map(e => `<option value="${e.id}" ${activityFilterEmp === e.id ? 'selected' : ''}>${escapeHtml(e.name)}</option>`).join('')}</select>
  </div>
  <div class="card table-card">
    <div class="table-wrap"><table>
      <thead><tr><th>Employee</th><th>Date</th><th>Calls</th><th>Visits</th><th>Meetings</th><th>New Leads</th><th>Check In</th><th>Check Out</th></tr></thead>
      <tbody>${filtered.slice(0, 60).map(a => `<tr><td>${escapeHtml(empName(a.employee_id))}</td><td>${fmtDate(a.activity_date)}</td><td class="num">${a.calls_made}</td><td class="num">${a.site_visits}</td><td class="num">${a.meetings}</td><td class="num">${a.new_leads}</td><td>${a.check_in_time ? fmtDateTime(a.check_in_time).split(', ')[1] + ' · ' + mapLink(a.check_in_lat, a.check_in_lng) : '—'}</td><td>${a.check_out_time ? fmtDateTime(a.check_out_time).split(', ')[1] + ' · ' + mapLink(a.check_out_lat, a.check_out_lng) : '—'}</td></tr>`).join('') || '<tr class="empty-row"><td colspan="8">No activity logged yet.</td></tr>'}</tbody>
    </table></div>
  </div>`;
}

function bindActivity(){
  if (isEmployee()){
    document.getElementById('checkInBtn').onclick = async (e) => {
      const btn = e.currentTarget; btn.disabled = true;
      const { lat, lng } = await getLocation();
      await rpc('check_in', { p_employee_id: session.employee.id, p_password: session.password, p_lat: lat, p_lng: lng });
      toast('Checked in', 'success'); renderRoute();
    };
    document.getElementById('checkOutBtn').onclick = async (e) => {
      const btn = e.currentTarget; btn.disabled = true;
      const { lat, lng } = await getLocation();
      await rpc('check_out', { p_employee_id: session.employee.id, p_password: session.password, p_lat: lat, p_lng: lng });
      toast('Checked out', 'success'); renderRoute();
    };
    document.getElementById('activityForm').onsubmit = async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const ok = await rpc('log_activity', {
        p_employee_id: session.employee.id, p_password: session.password, p_activity_date: todayISO(),
        p_calls_made: Number(fd.get('calls_made') || 0), p_site_visits: Number(fd.get('site_visits') || 0),
        p_meetings: Number(fd.get('meetings') || 0), p_new_leads: Number(fd.get('new_leads') || 0), p_notes: fd.get('notes') || ''
      });
      if (ok) { toast('Activity saved', 'success'); renderRoute(); }
    };
    return;
  }
  document.getElementById('empFilter').onchange = (e) => { activityFilterEmp = e.target.value; renderRoute(); };
}

// ============================================================
// Day offs
// ============================================================
async function renderDayOffs(){
  const [dayOffs, calendar] = await Promise.all([fetchMyOrAllDayOffs(), rpc('list_approved_day_offs_calendar', authTriple())]);
  dayOffsData.dayOffs = dayOffs;
  const employees = isAdmin() ? await fetchEmployeesPublic() : [];
  const empName = id => (employees.find(e => e.id === id) || {}).name || 'You';
  const requestForm = isEmployee() ? `
    <div class="card">
      <div class="card-title">Request time off</div>
      <form id="dayOffForm">
        <div class="form-row">
          <label class="field"><span class="lbl">From</span><input type="date" name="start_date" required min="${todayISO()}"></label>
          <label class="field"><span class="lbl">To</span><input type="date" name="end_date" required min="${todayISO()}"></label>
        </div>
        <label class="field"><span class="lbl">Reason</span><textarea name="reason"></textarea></label>
        <button class="btn btn-primary btn-block" type="submit">Submit request</button>
      </form>
    </div>` : '';
  const rows = dayOffs.map(d => `
    <div class="list-row">
      <div>
        <div class="main-text">${isAdmin() ? escapeHtml(empName(d.employee_id)) + ' — ' : ''}${fmtDate(d.start_date)} → ${fmtDate(d.end_date)}</div>
        <div class="sub-text">${escapeHtml(d.reason || 'No reason given')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="pill pill-${d.status}">${statusLabel(d.status)}</span>
        ${isAdmin() && d.status === 'pending' ? `
          <button class="btn btn-sm btn-secondary" data-decide="${d.id}" data-decision="approved">Approve</button>
          <button class="btn btn-sm btn-danger" data-decide="${d.id}" data-decision="rejected">Reject</button>` : ''}
      </div>
    </div>`).join('') || '<div class="empty-state"><p>No requests yet.</p></div>';
  const calRows = calendar.map(c => `<div class="list-row"><div class="main-text">${escapeHtml(c.employee_name)}</div><div class="sub-text">${fmtDate(c.start_date)} → ${fmtDate(c.end_date)}</div></div>`).join('') || '<div class="empty-state"><p>No upcoming time off.</p></div>';
  return `
  <div class="grid grid-3">
    <div style="grid-column:span 2">
      <div class="section-head"><h2>${isAdmin() ? 'Day-off Requests' : 'My Day Off'}</h2></div>
      ${requestForm}
      <div class="card table-card" style="margin-top:${requestForm ? '16px' : '0'}">${rows}</div>
    </div>
    <div class="card">
      <div class="card-title"><span class="title-icon">${icon('dayoff')}</span> Who's out (upcoming)</div>
      <div class="card-sub">Team calendar</div>
      ${calRows}
    </div>
  </div>`;
}

function bindDayOffs(){
  const form = document.getElementById('dayOffForm');
  if (form) form.onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const res = await rpc('request_day_off', { p_employee_id: session.employee.id, p_password: session.password, p_start_date: fd.get('start_date'), p_end_date: fd.get('end_date'), p_reason: fd.get('reason') || '' });
    if (res.success) { toast('Request submitted', 'success'); renderRoute(); } else toast(res.error || 'Could not submit', 'error');
  };
  document.querySelectorAll('[data-decide]').forEach(b => b.onclick = async () => {
    const ok = await rpc('admin_decide_day_off', { p_admin_passcode: session.passcode, p_day_off_id: b.dataset.decide, p_decision: b.dataset.decision });
    if (ok) { toast('Updated', 'success'); renderRoute(); }
  });
}

function bindTeam(){

  document.getElementById('addEmpBtn').onclick = () => openEmployeeModal(null);
  document.querySelectorAll('[data-edit-emp]').forEach(b => b.onclick = () => openEmployeeModal(teamData.employees.find(e => e.id === b.dataset.editEmp)));
  document.querySelectorAll('[data-reset-emp]').forEach(b => b.onclick = () => openResetPasswordModal(b.dataset.resetEmp));
  document.querySelectorAll('[data-del-emp]').forEach(b => b.onclick = async () => {
    if (!confirm('Delete this employee? This cannot be undone.')) return;
    const ok = await rpc('admin_delete_employee', { p_admin_passcode: session.passcode, p_employee_id: b.dataset.delEmp });
    if (ok) { toast('Employee deleted', 'success'); renderRoute(); }
  });
}

function openEmployeeModal(emp){
  const isNew = !emp;
  openModal(`
    <div class="modal-panel">
      <div class="modal-head"><h3>${isNew ? 'Add Employee' : 'Edit Employee'}</h3><button class="modal-close">${icon('close')}</button></div>
      <form id="empForm">
        <label class="field"><span class="lbl">Name</span><input type="text" name="name" required value="${isNew ? '' : escapeHtml(emp.name)}"></label>
        <label class="field"><span class="lbl">Email</span><input type="email" name="email" required ${isNew ? '' : 'readonly'} value="${isNew ? '' : escapeHtml(emp.email)}"></label>
        <label class="field"><span class="lbl">Phone</span><input type="tel" name="phone" value="${isNew ? '' : escapeHtml(emp.phone || '')}"></label>
        <label class="field"><span class="lbl">Job role / designation</span><input type="text" name="job_role" placeholder="e.g. Sales Executive" value="${isNew ? '' : escapeHtml(emp.job_role || '')}"></label>
        ${isNew ? `<label class="field"><span class="lbl">Initial password</span><input type="text" name="password" required></label>
        <p class="hint" style="margin-top:-10px;margin-bottom:14px">Shown only once here — copy it and share with the employee directly.</p>` : ''}
        <div class="form-row">
          <label class="field"><span class="lbl">Monthly sales target (₹)</span><input type="number" name="monthly_target" min="0" value="${isNew ? 0 : emp.monthly_target}"></label>
          <label class="field"><span class="lbl">Monthly salary (₹)</span><input type="number" name="monthly_salary" min="0" value="${isNew ? 0 : emp.monthly_salary}"></label>
        </div>
        ${!isNew ? `<label class="field"><span class="lbl">Status</span><select name="active"><option value="true" ${emp.active ? 'selected' : ''}>Active</option><option value="false" ${!emp.active ? 'selected' : ''}>Inactive</option></select></label>` : ''}
        <button class="btn btn-primary btn-block" type="submit">${isNew ? 'Create employee' : 'Save changes'}</button>
      </form>
    </div>`);
  document.getElementById('empForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    if (isNew){
      const res = await rpc('admin_create_employee', {
        p_admin_passcode: session.passcode, p_name: fd.get('name'), p_email: fd.get('email'), p_phone: fd.get('phone') || '',
        p_password: fd.get('password'), p_job_role: fd.get('job_role') || '',
        p_monthly_target: Number(fd.get('monthly_target') || 0), p_monthly_salary: Number(fd.get('monthly_salary') || 0)
      });
      if (res.success) { toast('Employee created', 'success'); closeModal(); renderRoute(); } else toast(res.error || 'Could not create', 'error');
    } else {
      const ok = await rpc('admin_update_employee', {
        p_admin_passcode: session.passcode, p_employee_id: emp.id, p_name: fd.get('name'), p_phone: fd.get('phone') || '',
        p_job_role: fd.get('job_role') || '', p_monthly_target: Number(fd.get('monthly_target') || 0),
        p_monthly_salary: Number(fd.get('monthly_salary') || 0), p_active: fd.get('active') === 'true'
      });
      if (ok) { toast('Employee updated', 'success'); closeModal(); renderRoute(); }
    }
  };
}

// ============================================================
// Plots (land inventory)
// ============================================================
const PLOT_TYPES = ['residential', 'commercial', 'agricultural'];
const PLOT_STATUSES = ['available', 'booked', 'sold'];
const FACINGS = ['', 'North', 'South', 'East', 'West', 'North-East', 'North-West', 'South-East', 'South-West'];

function plotLabel(p){
  const bits = [];
  if (p.layout_name) bits.push(p.layout_name);
  if (p.plot_number) bits.push('Plot ' + p.plot_number);
  return bits.length ? bits.join(' — ') + (p.title ? ' (' + p.title + ')' : '') : p.title;
}
function plotExtent(p){ return p.extent_value ? `${p.extent_value} ${p.extent_unit}` : '—'; }
function plotFacing(p){ return (p.facing ? p.facing : '—') + (p.is_corner ? ' · Corner' : ''); }

async function renderPlots(){
  const plots = await fetchPlots();
  plotsData.plots = plots;
  if (isEmployee()){
    return `
    <div class="section-head"><h2>Plots</h2></div>
    <div class="grid grid-3">${plots.map(p => `
      <div class="card">
        <div class="card-title">${escapeHtml(plotLabel(p))}</div>
        <div class="card-sub">${escapeHtml(p.location || '')}</div>
        <div class="kv"><span class="k">Type</span><span class="v">${statusLabel(p.type)}</span></div>
        <div class="kv"><span class="k">Extent</span><span class="v">${plotExtent(p)}</span></div>
        <div class="kv"><span class="k">Facing</span><span class="v">${plotFacing(p)}</span></div>
        ${p.road_width_ft ? `<div class="kv"><span class="k">Road width</span><span class="v">${p.road_width_ft} ft</span></div>` : ''}
        <div class="kv"><span class="k">Price</span><span class="v">${money(p.price)}</span></div>
        <div class="kv"><span class="k">Status</span><span class="v"><span class="pill pill-${p.status}">${statusLabel(p.status)}</span></span></div>
      </div>`).join('') || '<div class="empty-state"><p>No plots listed yet.</p></div>'}
    </div>`;
  }
  return `
  <div class="section-head"><h2>Plots</h2><button class="btn btn-primary" id="addPropBtn">${icon('plus')} Add Plot</button></div>
  <div class="card table-card">
    <div class="table-wrap"><table>
      <thead><tr><th>Plot</th><th>Type</th><th>Extent</th><th>Facing</th><th>Price</th><th>Status</th><th></th></tr></thead>
      <tbody>${plots.map(p => `
        <tr>
          <td>${escapeHtml(plotLabel(p))}${p.location ? `<div class="sub-text">${escapeHtml(p.location)}</div>` : ''}</td>
          <td>${statusLabel(p.type)}</td><td class="num">${plotExtent(p)}</td><td>${plotFacing(p)}</td>
          <td class="num">${money(p.price)}</td><td><span class="pill pill-${p.status}">${statusLabel(p.status)}</span></td>
          <td style="display:flex;gap:6px;justify-content:flex-end">
            <button class="btn btn-sm btn-secondary" data-edit-prop="${p.id}" title="Edit">${icon('edit')}</button>
            <button class="btn btn-sm btn-danger" data-del-prop="${p.id}" title="Delete">${icon('trash')}</button>
          </td>
        </tr>`).join('') || '<tr class="empty-row"><td colspan="7">No plots yet.</td></tr>'}</tbody>
    </table></div>
  </div>`;
}

function bindPlots(){
  if (isEmployee()) return;
  document.getElementById('addPropBtn').onclick = () => openPlotModal(null);
  document.querySelectorAll('[data-edit-prop]').forEach(b => b.onclick = () => openPlotModal(plotsData.plots.find(p => p.id === b.dataset.editProp)));
  document.querySelectorAll('[data-del-prop]').forEach(b => b.onclick = async () => {
    if (!confirm('Delete this plot?')) return;
    const ok = await rpc('admin_delete_plot', { p_admin_passcode: session.passcode, p_plot_id: b.dataset.delProp });
    if (ok) { toast('Plot deleted', 'success'); renderRoute(); }
  });
}

function openPlotModal(prop){
  const isNew = !prop;
  openModal(`
    <div class="modal-panel wide">
      <div class="modal-head"><h3>${isNew ? 'Add Plot' : 'Edit Plot'}</h3><button class="modal-close">${icon('close')}</button></div>
      <form id="propForm">
        <label class="field"><span class="lbl">Title</span><input type="text" name="title" required placeholder="e.g. Corner plot near main road" value="${isNew ? '' : escapeHtml(prop.title)}"></label>
        <div class="form-row">
          <label class="field"><span class="lbl">Layout / venture name (optional)</span><input type="text" name="layout_name" placeholder="Leave blank for a standalone parcel" value="${isNew ? '' : escapeHtml(prop.layout_name || '')}"></label>
          <label class="field"><span class="lbl">Plot number (optional)</span><input type="text" name="plot_number" value="${isNew ? '' : escapeHtml(prop.plot_number || '')}"></label>
        </div>
        <div class="form-row">
          <label class="field"><span class="lbl">Type</span>
            <select name="type">${PLOT_TYPES.map(t => `<option value="${t}" ${!isNew && prop.type === t ? 'selected' : ''}>${statusLabel(t)}</option>`).join('')}</select>
          </label>
          <label class="field"><span class="lbl">Location</span><input type="text" name="location" value="${isNew ? '' : escapeHtml(prop.location || '')}"></label>
        </div>
        <div class="form-row">
          <label class="field"><span class="lbl">Extent</span><input type="number" name="extent_value" min="0" step="0.01" value="${isNew ? '' : prop.extent_value}"></label>
          <label class="field"><span class="lbl">Unit</span>
            <select name="extent_unit">${['sqft', 'cents', 'acres'].map(u => `<option value="${u}" ${!isNew && prop.extent_unit === u ? 'selected' : ''}>${u}</option>`).join('')}</select>
          </label>
          <label class="field"><span class="lbl">Road width (ft, optional)</span><input type="number" name="road_width_ft" min="0" value="${!isNew && prop.road_width_ft != null ? prop.road_width_ft : ''}"></label>
        </div>
        <div class="form-row">
          <label class="field"><span class="lbl">Facing</span>
            <select name="facing">${FACINGS.map(f => `<option value="${f}" ${!isNew && prop.facing === f ? 'selected' : ''}>${f || '— Not specified —'}</option>`).join('')}</select>
          </label>
          <label class="field"><span class="lbl">Price (₹)</span><input type="number" name="price" min="0" value="${isNew ? 0 : prop.price}"></label>
        </div>
        <label class="field" style="display:flex;align-items:center;gap:8px">
          <input type="checkbox" name="is_corner" style="width:auto;min-height:0" ${!isNew && prop.is_corner ? 'checked' : ''}>
          <span class="lbl" style="margin:0">Corner plot</span>
        </label>
        ${!isNew ? `<label class="field"><span class="lbl">Status</span><select name="status">${PLOT_STATUSES.map(s => `<option value="${s}" ${prop.status === s ? 'selected' : ''}>${statusLabel(s)}</option>`).join('')}</select></label>` : ''}
        <button class="btn btn-primary btn-block" type="submit">${isNew ? 'Add plot' : 'Save changes'}</button>
      </form>
    </div>`);
  document.getElementById('propForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const common = {
      p_title: fd.get('title'), p_layout_name: fd.get('layout_name') || '', p_plot_number: fd.get('plot_number') || '',
      p_type: fd.get('type'), p_location: fd.get('location') || '', p_extent_value: Number(fd.get('extent_value') || 0),
      p_extent_unit: fd.get('extent_unit'), p_facing: fd.get('facing') || '', p_is_corner: fd.get('is_corner') === 'on',
      p_road_width_ft: fd.get('road_width_ft') ? Number(fd.get('road_width_ft')) : null, p_price: Number(fd.get('price') || 0)
    };
    if (isNew){
      const res = await rpc('admin_add_plot', { p_admin_passcode: session.passcode, ...common });
      if (res.success) { toast('Plot added', 'success'); closeModal(); renderRoute(); }
    } else {
      const ok = await rpc('admin_update_plot', { p_admin_passcode: session.passcode, p_plot_id: prop.id, ...common, p_status: fd.get('status') });
      if (ok) { toast('Plot updated', 'success'); closeModal(); renderRoute(); }
    }
  };
}
